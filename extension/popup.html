<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contendo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #faf9f8;
      color: #2f3333;
      padding: 16px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .wordmark {
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      font-size: 15px;
      color: #2f3333;
      letter-spacing: -0.02em;
    }
    .badge-source {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #58614f;
      background: #eef0eb;
      padding: 2px 7px;
      border-radius: 999px;
    }

    /* ── Section headings ── */
    .label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #9a9692;
      margin-bottom: 6px;
    }

    /* ── Text inputs ── */
    textarea {
      width: 100%;
      background: #ffffff;
      border: 1px solid #e8e5e2;
      border-radius: 8px;
      padding: 9px 11px;
      font-family: inherit;
      font-size: 13px;
      color: #2f3333;
      outline: none;
      transition: border-color 0.15s;
      resize: none;
      min-height: 100px;
      line-height: 1.5;
    }
    textarea:focus { border-color: #58614f; }

    /* ── Page title preview ── */
    .title-preview {
      background: #ffffff;
      border: 1px solid #e8e5e2;
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 12px;
      color: #645e57;
      line-height: 1.4;
      word-break: break-word;
    }

    /* ── Source type selector ── */
    .source-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .source-pill {
      cursor: pointer;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 500;
      background: #f3f4f3;
      color: #2f3333;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .source-pill:hover { background: #edeeed; }
    .source-pill.active {
      background: #eef0eb;
      border-color: #58614f;
      color: #58614f;
    }

    /* ── Primary button ── */
    .btn-primary {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #58614f 0%, #3a4a35 100%);
      color: #ffffff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Ghost/secondary button ── */
    .btn-ghost {
      background: none;
      border: 1px solid #e8e5e2;
      border-radius: 8px;
      color: #645e57;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      padding: 6px 12px;
      transition: border-color 0.12s;
    }
    .btn-ghost:hover { border-color: #58614f; color: #58614f; }

    /* ── Feedback messages ── */
    .feedback {
      font-size: 12px;
      padding: 8px 11px;
      border-radius: 8px;
      line-height: 1.4;
    }
    .feedback.error {
      background: #fdf0ed;
      color: #8b3a2a;
      border: 1px solid #f5c4b8;
    }
    .feedback.success {
      background: #eef0eb;
      color: #3a4a35;
      border: 1px solid #c5d4be;
    }
    .feedback.info {
      background: #f5f4f2;
      color: #645e57;
      border: 1px solid #e8e5e2;
    }

    /* ── Spacing helpers ── */
    .mt8  { margin-top: 8px; }
    .mt12 { margin-top: 12px; }
    .mt14 { margin-top: 14px; }

    /* ── Connect state ── */
    .connect-body {
      text-align: center;
      padding: 8px 0 4px;
    }
    .connect-icon {
      font-size: 28px;
      margin-bottom: 10px;
    }
    .connect-title {
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      font-size: 14px;
      color: #2f3333;
      margin-bottom: 6px;
    }
    .connect-hint {
      font-size: 11px;
      color: #9a9692;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    /* ── Loading spinner ── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(47,51,51,0.15);
      border-top-color: #58614f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    .spinner-white {
      border-color: rgba(255,255,255,0.4);
      border-top-color: #ffffff;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Hidden ── */
    [hidden] { display: none !important; }
  </style>
</head>
<body>

  <!-- ── CONNECTING (brief — shown while reading token from Contendo tab) ── -->
  <div id="state-connecting">
    <div class="header">
      <span class="wordmark">Contendo</span>
    </div>
    <div class="feedback info" style="text-align:center;padding:18px 11px;">
      <span class="spinner"></span> Connecting…
    </div>
  </div>

  <!-- ── CONNECT (shown when Contendo is not open or user is not signed in) ── -->
  <div id="state-connect" hidden>
    <div class="header">
      <span class="wordmark">Contendo</span>
    </div>
    <div class="connect-body">
      <div class="connect-icon">🔗</div>
      <div class="connect-title">Sign in to connect</div>
      <p class="connect-hint">
        Open Contendo and sign in — the extension will connect automatically.
      </p>
      <button class="btn-primary" id="open-contendo-btn">Open Contendo</button>
      <div id="connect-feedback" class="mt8" hidden></div>
    </div>
  </div>

  <!-- ── PAGE ── -->
  <div id="state-page" hidden>
    <div class="header">
      <span class="wordmark">Contendo</span>
      <span class="badge-source" id="page-badge">Article</span>
    </div>

    <div class="label">Page title</div>
    <div class="title-preview" id="page-title-preview">Loading…</div>

    <div class="mt12">
      <div class="label">Save as</div>
      <div class="source-pills">
        <button class="source-pill active" data-source="article" data-origin="saved">Article</button>
        <button class="source-pill" data-source="note" data-origin="personal">Personal note</button>
      </div>
    </div>

    <div class="mt14">
      <button class="btn-primary" id="page-ingest-btn">Add to Memory</button>
    </div>

    <div id="page-feedback" class="mt8" hidden></div>
  </div>

  <!-- ── YOUTUBE ── -->
  <div id="state-youtube" hidden>
    <div class="header">
      <span class="wordmark">Contendo</span>
      <span class="badge-source">YouTube</span>
    </div>

    <div class="label">Video title</div>
    <div class="title-preview" id="yt-title-preview">Loading…</div>

    <div class="mt12">
      <div class="label">Transcript</div>
      <textarea id="yt-transcript" placeholder="Paste the video transcript here. On YouTube, click '⋯ More' under the video → 'Show transcript', then copy all lines."></textarea>
    </div>

    <div class="mt12">
      <button class="btn-primary" id="yt-ingest-btn">Add video to Memory</button>
    </div>

    <div id="yt-feedback" class="mt8" hidden></div>
  </div>

  <!-- ── LOADING ── -->
  <div id="state-loading" hidden>
    <div class="header">
      <span class="wordmark">Contendo</span>
    </div>
    <div class="feedback info" style="text-align:center;padding:18px 11px;">
      <span class="spinner"></span> Saving to your knowledge base…
    </div>
  </div>

  <!-- ── SUCCESS ── -->
  <div id="state-success" hidden>
    <div class="header">
      <span class="wordmark">Contendo</span>
    </div>
    <div class="feedback success" style="text-align:center;padding:18px 11px;">
      <div style="font-size:22px;margin-bottom:6px;">✓</div>
      <div id="success-msg">Saved to your knowledge base.</div>
    </div>
    <button class="btn-ghost mt12" id="success-back-btn" style="width:100%;">Add another</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
